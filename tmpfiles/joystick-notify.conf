# /etc/tmpfiles.d/joystick-notify.conf
# Ensure joystick-notify runtime directories exist with world-writable permissions.
# udev (root) and the user service both write here; 0777 lets both sides work
# without setuid or ACLs.
d /tmp/joystick-notify       0777 - - -
d /tmp/joystick-notify/logs  0777 - - -
d /tmp/joystick-notify/locks 0777 - - -
