# Sunshine configuration — AMD Radeon RX 9070 XT (Navi 48, gfx1201)
# Optimized for VA-API hardware encoding on Linux + Wayland/KDE Plasma
#
# This config is suitable as a general-purpose starting point.
# Tune per-client by adjusting resolution/bitrate/fps in the web UI
# (https://localhost:47990) → Client Settings → Stream Quality.

# ── Encoding ───────────────────────────────────────────────

# VA-API is the primary encoder for AMD GPUs on Linux.
# Falls back to Vulkan if VA-API has issues. Never use "amf" — that's Windows-only.
encoder = vaapi

# HEVC (H.265) mode: 2 = SDR, 3 = HDR (advertises both Main + Main10).
hevc_mode = 2

# AV1 mode: 1 = disabled (use sparingly), 2 = SDR only, 3 = HDR.
# AV1 has ~30% better compression than HEVC but higher encoder latency.
# Best for slow-paced games (RPGs, strategy) at high quality. Not ideal for competitive/fast-action.
av1_mode = 1

# ── Capture ───────────────────────────────────────────────

# 'kwin' uses KDE's screencast API (lowest overhead on Plasma Wayland).
# Falls back to 'kms' if kwin is unavailable.
capture = kwin
cursor = disabled

# Explicit DRM adapter (render node) — only card1 exists on this system, no card0
adapter_name = /dev/dri/renderD128

# DRM output connector to capture. Without this Sunshine defaults to monitor index 0,
# which fails when card0 doesn't exist. HDMI-A-2 = desk monitor.
output_name = HDMI-A-2

# For HDR streaming, change capture to 'kms'. KMS doesn't support HDR with kwin yet.
# capture = kms

# ── Bitrate & Quality ────────────────────────────────────

# Maximum bitrate (kbps). 0 = Moonlight decides based on network capacity.
max_bitrate = 0

# Default bitrate for new streams (kbps). Tuned per-client in the web UI.
bitrate = 25000

# Rate control mode: CBR is most compatible, VBR gives slightly better quality.
rc_mode = cbr

# Keyframe interval in seconds (~2s is standard for game streaming)
keyint = 2

# Forward Error Correction percentage (helps with WiFi packet loss).
# Increase to 30-40 if on poor WiFi; decrease to 10 or 0 on wired.
fec_percentage = 20

# ── Performance ───────────────────────────────────────────

# Minimum FPS target before stream pauses (0 = auto, no pause)
minimum_fps_target = 0

# Minimum threads for encoding (default 4 is fine for RX 9070 XT)
min_threads = 4

# Log level: 1=trace, 2=debug, 3=info(default), 4=warn, 5=error
log_path = /tmp/sunshine.log
min_log_level = 3

# ── Audio ────────────────────────────────────────────────

# Audio sample rate and channels (auto-detected by default)
audio_sample_rate = 48000
audio_channels = 2

# Virtual sink for surround sound passthrough (optional).
# Uncomment if you want Steam Streaming Speakers virtual device:
# virtual_sink = Steam Streaming Speakers
